name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to publish
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  npm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag || github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Verify publishing runtime
        shell: bash
        run: |
          node --version
          npm --version
          npm_version="$(npm --version)"
          node -e 'const [major, minor] = process.argv[1].split(".").map(Number); if (major < 11 || (major === 11 && minor < 5)) process.exit(1)' "${npm_version}" || {
            echo "Trusted publishing requires npm >=11.5.1; found ${npm_version}."
            exit 1
          }

      - name: Install
        run: npm ci

      - name: Validate release tag
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./packages/mcp/package.json').version")"
          RELEASE_TAG="${{ inputs.release_tag || github.event.release.tag_name }}"
          if [[ "${RELEASE_TAG}" != "v${PACKAGE_VERSION}" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match package version v${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit
        run: npm audit

      - name: Ensure version is not already published
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./packages/mcp/package.json').version")"
          if npm view "toolgate-mcp@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "toolgate-mcp@${PACKAGE_VERSION} is already published."
            exit 1
          fi

      - name: Publish to npm
        shell: bash
        run: |
          if [[ -z "${NODE_AUTH_TOKEN}" ]]; then
            unset NODE_AUTH_TOKEN
            echo "NPM_TOKEN is not configured. Attempting npm trusted publishing."
          else
            echo "Publishing with configured NPM_TOKEN."
          fi
          npm publish -w toolgate-mcp --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
