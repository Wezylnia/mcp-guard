name: Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  npm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Validate release tag
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./packages/mcp/package.json').version")"
          RELEASE_TAG="${GITHUB_REF_NAME}"
          if [[ "${RELEASE_TAG}" != "v${PACKAGE_VERSION}" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match package version v${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit
        run: npm audit

      - name: Ensure version is not already published
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./packages/mcp/package.json').version")"
          if npm view "toolgate-mcp@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "toolgate-mcp@${PACKAGE_VERSION} is already published."
            exit 1
          fi

      - name: Publish to npm
        shell: bash
        run: |
          if [[ -z "${NODE_AUTH_TOKEN}" ]]; then
            unset NODE_AUTH_TOKEN
            echo "NPM_TOKEN is not configured. Attempting npm trusted publishing."
          else
            echo "Publishing with configured NPM_TOKEN."
          fi
          npm publish -w toolgate-mcp --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
